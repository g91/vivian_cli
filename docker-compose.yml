# =============================================================================
# Vivian CLI — docker-compose.yml
# =============================================================================
# Three service profiles:
#
#   tui         Interactive terminal mode (default)
#   web         Web GUI on http://localhost:5000
#   desktop     Cyberpunk desktop web GUI (ports 7979 + 7878)
#
# Quick-start examples:
#   docker compose run --rm tui            # Interactive TUI
#   docker compose up web                  # Web GUI at http://localhost:5000
#   docker compose up desktop              # Desktop web GUI
#   docker compose up web -d               # Detached web GUI
#
# Pass extra CLI flags via VIVIAN_ARGS environment variable:
#   VIVIAN_ARGS="--model gemini-1.5-pro" docker compose run --rm tui
# =============================================================================

x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
    args:
      PYTHON_VERSION: "3.12"
  image: vivian-cli:latest
  volumes:
    # Persist Vivian config and session data across container restarts
    - vivian-config:/root/.vivian
    # Optionally mount your workspace into the container for file editing
    # Uncomment the line below and set WORKSPACE_DIR in your .env
    # - ${WORKSPACE_DIR:-./workspace}:/workspace
  environment:
    # Pass through AI provider keys from host environment (all optional)
    - VIVIAN_API_KEY=${VIVIAN_API_KEY:-}
    - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    - GROQ_API_KEY=${GROQ_API_KEY:-}
    - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
    - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
    - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
    - HF_TOKEN=${HF_TOKEN:-}
    - COHERE_API_KEY=${COHERE_API_KEY:-}
    - OLLAMA_HOST=${OLLAMA_HOST:-}
    - VIVIAN_PROVIDER=${VIVIAN_PROVIDER:-}
    # Extra CLI arguments (e.g. --model gpt-4o --no-wizard)
    - VIVIAN_ARGS=${VIVIAN_ARGS:-}
  restart: "no"

services:

  # ── TUI — interactive terminal ─────────────────────────────────────────────
  tui:
    <<: *common
    container_name: vivian-tui
    stdin_open: true
    tty: true
    # Mount current working directory as the workspace for file tools
    volumes:
      - vivian-config:/root/.vivian
      - .:/workspace
    working_dir: /workspace
    profiles:
      - tui
      - default

  # ── Web GUI — browser-based interface ─────────────────────────────────────
  web:
    <<: *common
    container_name: vivian-web
    command: ["--web-gui", "--web-host", "0.0.0.0", "--web-port", "5000", "--no-open-browser", "--no-wizard"]
    ports:
      - "${WEB_PORT:-5000}:5000"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    profiles:
      - web

  # ── Desktop Web GUI ────────────────────────────────────────────────────────
  desktop:
    <<: *common
    container_name: vivian-desktop
    command: ["--desktop-gui", "--desktop-host", "0.0.0.0", "--desktop-port", "7979", "--no-wizard"]
    ports:
      - "${DESKTOP_PORT:-7979}:7979"
      - "${IDE_PORT:-7878}:7878"
    restart: unless-stopped
    profiles:
      - desktop

  # ── Ollama sidecar (optional — uncomment to run local models) ─────────────
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: vivian-ollama
  #   volumes:
  #     - ollama-models:/root/.ollama
  #   ports:
  #     - "11434:11434"
  #   restart: unless-stopped
  #   profiles:
  #     - ollama

volumes:
  vivian-config:
    name: vivian-config
