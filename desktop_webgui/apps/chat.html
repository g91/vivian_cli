<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vivian AI Chat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cyan:   #00ffe7;
    --pink:   #ff2d78;
    --purple: #a020f0;
    --yellow: #ffe600;
    --green:  #39ff14;
    --bg:     #0a0a0f;
    --bg2:    #0e0e1a;
    --bg3:    #13131f;
    --dim:    #3a3a5a;
    --text:   #d0d0f0;
  }

  html, body {
    height: 100%;
    font-family: "Consolas", "Courier New", monospace;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* ── Layout ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: var(--bg2);
    border-bottom: 1px solid var(--purple);
    flex-shrink: 0;
  }
  #header .logo { font-size: 18px; }
  #header h1 {
    font-size: 14px;
    color: var(--cyan);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 0 8px var(--cyan);
    flex: 1;
  }
  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dim);
    transition: background 0.3s, box-shadow 0.3s;
  }
  #status-dot.online  { background: var(--green);  box-shadow: 0 0 6px var(--green);  }
  #status-dot.typing  { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
  #status-dot.error   { background: var(--pink);   box-shadow: 0 0 6px var(--pink);   }
  #status-label {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
  }

  /* ── Capabilities bar ── */
  #caps-bar {
    display: flex;
    gap: 6px;
    padding: 5px 14px;
    background: var(--bg3);
    border-bottom: 1px solid #1e1e30;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .cap-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    border: 1px solid;
    letter-spacing: 0.5px;
    opacity: 0.75;
  }
  .cap-badge.tools    { color: var(--cyan);   border-color: var(--cyan);   }
  .cap-badge.commands { color: var(--yellow); border-color: var(--yellow); }
  .cap-badge.skills   { color: var(--purple); border-color: var(--purple); }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 5px; }
  #messages::-webkit-scrollbar-track { background: var(--bg); }
  #messages::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 92%;
    gap: 3px;
  }
  .msg.user  { align-self: flex-end; align-items: flex-end; }
  .msg.vivian { align-self: flex-start; align-items: flex-start; }

  .msg-label {
    font-size: 10px;
    letter-spacing: 1px;
    opacity: 0.55;
    text-transform: uppercase;
  }
  .msg.user   .msg-label { color: var(--pink); }
  .msg.vivian .msg-label { color: var(--cyan); }

  .msg-bubble {
    padding: 9px 13px;
    border-radius: 4px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .msg-bubble {
    background: #200030;
    border: 1px solid var(--pink);
    color: #ffd0e8;
    box-shadow: 0 0 6px rgba(255,45,120,0.25);
  }
  .msg.vivian .msg-bubble {
    background: #001520;
    border: 1px solid var(--cyan);
    color: #c0fff8;
    box-shadow: 0 0 6px rgba(0,255,231,0.15);
  }

  /* Tool call cards */
  .tool-card {
    margin-top: 5px;
    padding: 6px 10px;
    background: #0a0820;
    border: 1px solid var(--purple);
    border-left: 3px solid var(--purple);
    border-radius: 3px;
    font-size: 11px;
    color: #c0a0ff;
  }
  .tool-card .tool-name { color: var(--purple); font-weight: bold; }
  .tool-card .tool-result { color: #807090; margin-top: 3px; }

  /* Cursor blink for streaming */
  .cursor {
    display: inline-block;
    width: 8px; height: 14px;
    background: var(--cyan);
    animation: blink 0.8s step-end infinite;
    vertical-align: text-bottom;
    margin-left: 2px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── Input row ── */
  #input-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 10px 14px;
    background: var(--bg2);
    border-top: 1px solid var(--purple);
    flex-shrink: 0;
  }
  #prompt {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--dim);
    border-radius: 3px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 8px 10px;
    resize: none;
    min-height: 38px;
    max-height: 120px;
    outline: none;
    transition: border-color 0.2s;
  }
  #prompt:focus { border-color: var(--cyan); box-shadow: 0 0 4px rgba(0,255,231,0.2); }
  #send-btn {
    background: none;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    font-family: inherit;
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: background 0.2s, box-shadow 0.2s;
    flex-shrink: 0;
    align-self: flex-end;
  }
  #send-btn:hover:not(:disabled) { background: rgba(0,255,231,0.1); box-shadow: 0 0 8px var(--cyan); }
  #send-btn:disabled { border-color: var(--dim); color: var(--dim); cursor: not-allowed; }
  #stop-btn {
    background: none;
    border: 1px solid var(--pink);
    color: var(--pink);
    font-family: inherit;
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    flex-shrink: 0;
    align-self: flex-end;
    display: none;
  }
  #stop-btn:hover { background: rgba(255,45,120,0.1); }
  #stop-btn.visible { display: block; }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div id="header">
    <span class="logo">🤖</span>
    <h1>Vivian AI</h1>
    <span id="status-dot"></span>
    <span id="status-label">connecting…</span>
  </div>

  <!-- Capabilities bar -->
  <div id="caps-bar">
    <span class="cap-badge tools"   id="badge-tools">…tools</span>
    <span class="cap-badge commands" id="badge-commands">…commands</span>
    <span class="cap-badge skills"  id="badge-skills">…skills</span>
  </div>

  <!-- Message area -->
  <div id="messages">
    <div class="msg vivian" id="welcome-msg">
      <span class="msg-label">Vivian</span>
      <div class="msg-bubble">Hello! I'm Vivian. All tools and systems are connected.
Ask me anything or give me a task.</div>
    </div>
  </div>

  <!-- Input -->
  <div id="input-row">
    <textarea id="prompt" rows="1" placeholder="Ask Vivian…" autocomplete="off" spellcheck="false"></textarea>
    <button id="send-btn">Send</button>
    <button id="stop-btn">■ Stop</button>
  </div>

</div>
<script>
"use strict";

const $ = id => document.getElementById(id);
const statusDot   = $("status-dot");
const statusLabel = $("status-label");
const messages    = $("messages");
const promptEl    = $("prompt");
const sendBtn     = $("send-btn");
const stopBtn     = $("stop-btn");

let _es = null;   // active EventSource
let _currentBubble = null;
let _currentToolCards = null;

// ── Status helpers ──────────────────────────────────────────────────────────
function setStatus(state, label) {
  statusDot.className = state;
  statusLabel.textContent = label;
}

// ── Load capabilities ────────────────────────────────────────────────────────
fetch("/api/health")
  .then(r => r.json())
  .then(d => {
    const rt = d.runtime || {};
    $("badge-tools").textContent    = (rt.tool_count    ?? "?") + " tools";
    $("badge-commands").textContent = (rt.command_count ?? "?") + " commands";
    $("badge-skills").textContent   = (rt.skill_count   ?? "?") + " skills";
    setStatus("online", "ready");
  })
  .catch(() => setStatus("error", "offline"));

// ── Message builders ─────────────────────────────────────────────────────────
function appendMsg(role, text) {
  const wrap = document.createElement("div");
  wrap.className = "msg " + role;
  const label = document.createElement("span");
  label.className = "msg-label";
  label.textContent = role === "user" ? "You" : "Vivian";
  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";
  bubble.textContent = text;
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
  return bubble;
}

function startVivianMsg() {
  const wrap = document.createElement("div");
  wrap.className = "msg vivian";
  const label = document.createElement("span");
  label.className = "msg-label";
  label.textContent = "Vivian";
  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";
  // blinking cursor
  const cur = document.createElement("span");
  cur.className = "cursor";
  cur.id = "_cursor";
  bubble.appendChild(cur);
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
  _currentBubble = bubble;
  _currentToolCards = wrap;
  return bubble;
}

function appendTool(name, result) {
  if (!_currentToolCards) return;
  const card = document.createElement("div");
  card.className = "tool-card";
  const nm = document.createElement("span");
  nm.className = "tool-name";
  nm.textContent = "⚙ " + name;
  card.appendChild(nm);
  if (result !== undefined) {
    const res = document.createElement("div");
    res.className = "tool-result";
    const text = typeof result === "string" ? result : JSON.stringify(result, null, 2);
    res.textContent = text.length > 300 ? text.slice(0, 300) + "…" : text;
    card.appendChild(res);
  }
  _currentToolCards.appendChild(card);
  messages.scrollTop = messages.scrollHeight;
}

// ── Send ──────────────────────────────────────────────────────────────────────
function sendPrompt() {
  const text = promptEl.value.trim();
  if (!text || _es) return;

  appendMsg("user", text);
  promptEl.value = "";
  promptEl.style.height = "";
  sendBtn.disabled = true;
  stopBtn.classList.add("visible");
  setStatus("typing", "thinking…");

  startVivianMsg();

  const url = "/api/chat?q=" + encodeURIComponent(text);
  _es = new EventSource(url);

  _es.onmessage = (e) => {
    let ev;
    try { ev = JSON.parse(e.data); } catch { return; }

    if (ev.type === "chunk") {
      // Replace cursor with text then re-append cursor
      const cur = document.getElementById("_cursor");
      if (cur) cur.remove();
      _currentBubble.appendChild(document.createTextNode(ev.text));
      const newCur = document.createElement("span");
      newCur.className = "cursor";
      newCur.id = "_cursor";
      _currentBubble.appendChild(newCur);
      messages.scrollTop = messages.scrollHeight;
    } else if (ev.type === "tool_start") {
      appendTool(ev.name);
    } else if (ev.type === "tool") {
      appendTool(ev.name, ev.result);
    } else if (ev.type === "error") {
      const cur = document.getElementById("_cursor");
      if (cur) cur.remove();
      _currentBubble.textContent = "⚠ " + ev.error;
      _currentBubble.style.color = "var(--pink)";
      done();
    } else if (ev.type === "done") {
      done();
    }
  };

  _es.onerror = () => {
    const cur = document.getElementById("_cursor");
    if (cur) cur.remove();
    if (_currentBubble && !_currentBubble.textContent.trim()) {
      _currentBubble.textContent = "Connection error.";
      _currentBubble.style.color = "var(--pink)";
    }
    done();
  };
}

function done() {
  // Remove blinking cursor
  const cur = document.getElementById("_cursor");
  if (cur) cur.remove();
  if (_es) { _es.close(); _es = null; }
  sendBtn.disabled = false;
  stopBtn.classList.remove("visible");
  setStatus("online", "ready");
  _currentBubble = null;
  _currentToolCards = null;
  messages.scrollTop = messages.scrollHeight;
}

function stop() {
  if (_currentBubble) {
    const cur = document.getElementById("_cursor");
    if (cur) cur.remove();
    const note = document.createElement("span");
    note.style.color = "var(--yellow)";
    note.textContent = " [stopped]";
    _currentBubble.appendChild(note);
  }
  done();
}

// ── Event wiring ──────────────────────────────────────────────────────────────
sendBtn.addEventListener("click", sendPrompt);
stopBtn.addEventListener("click", stop);

promptEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendPrompt();
  }
});

// Auto-grow textarea
promptEl.addEventListener("input", () => {
  promptEl.style.height = "auto";
  promptEl.style.height = Math.min(promptEl.scrollHeight, 120) + "px";
});
</script>
</body>
</html>
